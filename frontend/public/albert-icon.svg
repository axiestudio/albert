<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="#1a1a2e"/>
  <circle cx="60" cy="60" r="56" stroke="#e2e8f0" stroke-width="1.5" opacity="0.15"/>
  
  <!-- Scales of Justice -->
  <g transform="translate(60,58)">
    <!-- Central pillar -->
    <rect x="-2" y="-24" width="4" height="36" rx="2" fill="#94a3b8"/>
    
    <!-- Balance beam -->
    <rect x="-28" y="-26" width="56" height="3.5" rx="1.75" fill="#cbd5e1"/>
    
    <!-- Left pan chain -->
    <line x1="-24" y1="-23" x2="-24" y2="-8" stroke="#94a3b8" stroke-width="1.5"/>
    <!-- Left pan -->
    <path d="M-34,-8 Q-24,-4 -14,-8" stroke="#cbd5e1" stroke-width="2" fill="none"/>
    <path d="M-34,-8 Q-24,0 -14,-8" fill="#334155" opacity="0.5"/>
    
    <!-- Right pan chain -->
    <line x1="24" y1="-23" x2="24" y2="-8" stroke="#94a3b8" stroke-width="1.5"/>
    <!-- Right pan -->
    <path d="M14,-8 Q24,-4 34,-8" stroke="#cbd5e1" stroke-width="2" fill="none"/>
    <path d="M14,-8 Q24,0 34,-8" fill="#334155" opacity="0.5"/>
    
    <!-- Base -->
    <rect x="-12" y="12" width="24" height="3" rx="1.5" fill="#94a3b8"/>
  </g>
  
  <!-- "A" monogram -->
  <text x="60" y="98" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e2e8f0" letter-spacing="3">ALBERT</text>
  
  <!-- Subtle glow ring -->
  <circle cx="60" cy="60" r="56" stroke="url(#glow)" stroke-width="2" opacity="0.3"/>
  
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
</svg>
